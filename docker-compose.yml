name: itmarket

services:
  postgres:
    image: postgres:17.5-alpine3.21
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?Set POSTGRES_DB in .env}
      POSTGRES_USER: ${POSTGRES_USER:?Set POSTGRES_USER in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    ports:
      - "${POSTGRES_BIND_ADDRESS:?Set POSTGRES_BIND_ADDRESS in .env}:${POSTGRES_PORT:?Set POSTGRES_PORT in .env}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:8.0.2-alpine3.21
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}
    command:
      - /bin/sh
      - -ec
      - exec redis-server --appendonly yes --requirepass "$$REDIS_PASSWORD"
    ports:
      - "${REDIS_BIND_ADDRESS:?Set REDIS_BIND_ADDRESS in .env}:${REDIS_PORT:?Set REDIS_PORT in .env}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'redis-cli --no-auth-warning -a "$$REDIS_PASSWORD" ping | grep -q PONG',
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?Set MINIO_ROOT_USER in .env}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?Set MINIO_ROOT_PASSWORD in .env}
    ports:
      - "${MINIO_BIND_ADDRESS:?Set MINIO_BIND_ADDRESS in .env}:${MINIO_API_PORT:?Set MINIO_API_PORT in .env}:9000"
      - "${MINIO_BIND_ADDRESS:?Set MINIO_BIND_ADDRESS in .env}:${MINIO_CONSOLE_PORT:?Set MINIO_CONSOLE_PORT in .env}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test:
        [
          "CMD",
          "curl",
          "--fail",
          "--silent",
          "http://localhost:9000/minio/health/live",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  minio-bucket-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?Set MINIO_ROOT_USER in .env}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?Set MINIO_ROOT_PASSWORD in .env}
      MINIO_BUCKET: ${MINIO_BUCKET:?Set MINIO_BUCKET in .env}
    entrypoint:
      - /bin/sh
      - -ec
    command:
      - |
        mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"
        mc mb --ignore-existing "local/$$MINIO_BUCKET"
        mc anonymous set none "local/$$MINIO_BUCKET"

  mailpit:
    image: axllent/mailpit:v1.27.1
    restart: unless-stopped
    environment:
      MP_DATABASE: /data/mailpit.db
      MP_MAX_MESSAGES: "5000"
    ports:
      - "${MAILPIT_BIND_ADDRESS:?Set MAILPIT_BIND_ADDRESS in .env}:${MAILPIT_SMTP_PORT:?Set MAILPIT_SMTP_PORT in .env}:1025"
      - "${MAILPIT_BIND_ADDRESS:?Set MAILPIT_BIND_ADDRESS in .env}:${MAILPIT_UI_PORT:?Set MAILPIT_UI_PORT in .env}:8025"
    volumes:
      - mailpit_data:/data
    healthcheck:
      test: ["CMD", "/mailpit", "readyz"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

volumes:
  postgres_data:
  redis_data:
  minio_data:
  mailpit_data:
