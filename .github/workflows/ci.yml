name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality and tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:17.5-alpine3.21
        env:
          POSTGRES_DB: itmarket_ci
          POSTGRES_USER: itmarket_ci
          POSTGRES_PASSWORD: ci_postgres_ephemeral
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U itmarket_ci -d itmarket_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:8.0.2-alpine3.21
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://itmarket_ci:ci_postgres_ephemeral@localhost:5432/itmarket_ci?schema=public
      REDIS_URL: redis://localhost:6379/0
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Enable pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.17.0
          cache: pnpm

      - name: Install frozen dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Check OpenAPI contract drift
        run: pnpm openapi:check

      - name: Validate migrations and schema
        run: pnpm db:migrate && pnpm db:migrate:check

      - name: Run unit tests
        run: pnpm test

      - name: Run integration tests
        run: pnpm test:integration

      - name: Run end-to-end regression tests
        run: pnpm test:e2e

      - name: Validate load test script
        run: pnpm test:load:syntax

      - name: Install Chromium for accessibility regression
        run: pnpm exec playwright install --with-deps chromium

      - name: Run browser accessibility regression
        run: pnpm test:browser

      - name: Build applications
        run: pnpm build

  dependency-scan:
    name: Dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Enable pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.17.0
          cache: pnpm

      - name: Install frozen dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit production dependencies
        run: pnpm audit --prod --audit-level high

  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Review dependency changes
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan repository for secrets
        uses: gitleaks/gitleaks-action@v2

  sast:
    name: CodeQL SAST
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript

      - name: Analyze source
        uses: github/codeql-action/analyze@v3

  docker-build:
    name: Build and scan ${{ matrix.application }} image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - application: api
            dockerfile: infra/docker/api.Dockerfile
          - application: storefront
            dockerfile: infra/docker/storefront.Dockerfile
          - application: backoffice
            dockerfile: infra/docker/backoffice.Dockerfile
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build production image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          load: true
          push: false
          tags: itmarket/${{ matrix.application }}:ci
          build-args: |
            RELEASE_SHA=${{ github.sha }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          cache-from: type=gha,scope=${{ matrix.application }}
          cache-to: type=gha,mode=max,scope=${{ matrix.application }}

      - name: Scan image for high and critical vulnerabilities
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: itmarket/${{ matrix.application }}:ci
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          severity: HIGH,CRITICAL
